version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: userapi-postgres
    environment:
      POSTGRES_DB: userapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userapi"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  projects-api:
    image: dowglasmaia/product-api:v3
    container_name: project-api
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/v1/actuator/health | grep -q '\"UP\"' || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

