spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false

security:
  jwt:
    secret: test-secret-key-that-is-exactly-32-chars!
    expiration-ms: 3600000
  disabled: false

integration:
  projects-api:
    base-url: http://localhost:9999
    connect-timeout-ms: 1000
    response-timeout-ms: 1000

resilience4j:
  ratelimiter:
    instances:
      userApiLimiter:
        limit-for-period: 100000
        limit-refresh-period: 1s
        timeout-duration: 0s
  retry:
    instances:
      projectsApi:
        max-attempts: 1
        wait-duration: 0ms
  circuitbreaker:
    instances:
      projectsApi:
        sliding-window-size: 10
        failure-rate-threshold: 100
        minimum-number-of-calls: 999
        wait-duration-in-open-state: 1s

management:
  tracing:
    enabled: false
