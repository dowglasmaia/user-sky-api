spring:
  application:
    name: user-api

  threads:
    virtual:
      enabled: true   # Java 21 virtual threads for all web/async workloads

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/userapi}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true
        batch_versioned_data: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

security:
  jwt:
    secret: ${JWT_SECRET:user-api-default-secret-key-change-in-production-32chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  disabled: false

integration:
  projects-api:
    base-url: ${PROJECTS_API_BASE_URL:http://localhost:8081/api/v1}
    connect-timeout-ms: ${PROJECTS_API_CONNECT_TIMEOUT_MS:2000}
    response-timeout-ms: ${PROJECTS_API_RESPONSE_TIMEOUT_MS:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers,httpexchanges
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
    httpexchanges:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true    # enables _bucket → histogram_quantile in Grafana
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s
  # Distributed tracing (Micrometer → OpenTelemetry → Jaeger)
  tracing:
    sampling:
      probability: 1.0   # 100% sampling; lower in production (e.g. 0.1)
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  # Expose traceId/spanId in /actuator/health and error responses
  observations:
    annotations:
      enabled: true

logging:
  level:
    root: INFO
    com.luciodowglas.userapi: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  # Human-readable pattern (active when logback-spring.xml "default" profile is used)
  #pattern:
  #  console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} traceId=%X{traceId} spanId=%X{spanId} correlationId=%X{correlationId} - %msg%n"

resilience4j:
  ratelimiter:
    instances:
      userApiLimiter:
        limit-for-period: 50
        limit-refresh-period: 1s
        timeout-duration: 0s
        register-health-indicator: true

  retry:
    instances:
      projectsApi:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - com.luciodowglas.userapi.exception.ExternalIntegrationException
        ignore-exceptions:
          - com.luciodowglas.userapi.exception.ProjectNotFoundException

  circuitbreaker:
    instances:
      projectsApi:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - com.luciodowglas.userapi.exception.ExternalIntegrationException
        ignore-exceptions:
          - com.luciodowglas.userapi.exception.ProjectNotFoundException
